<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fase 6: Blindagem Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: #020617; color: #fff; font-family: sans-serif; 
            height: 100vh; margin: 0; overflow: hidden; 
            display: flex; flex-direction: column; align-items: center;
            touch-action: none; /* Bloqueia o scroll da página inteira */
        }
        
        .map-container { 
            position: relative; width: 350px; height: 300px; 
            background: rgba(30, 41, 59, 0.4); border: 2px dashed #3b82f6; 
            border-radius: 20px; margin-top: 40px;
        }

        .area { 
            position: absolute; width: 90px; height: 50px; 
            background: rgba(239, 68, 68, 0.2); border: 2px solid #ef4444; 
            border-radius: 8px; display: flex; align-items: center; 
            justify-content: center; font-size: 0.6rem; font-weight: bold; 
            text-align: center; pointer-events: none; transition: 0.3s;
        }

        .protected { 
            background: rgba(34, 197, 94, 0.4) !important; 
            border-color: #22c55e !important; color: #fff; 
        }

        .shield { 
            width: 60px; height: 60px; background: #3b82f6; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-size: 1.8rem; 
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); 
            position: absolute; cursor: move;
            touch-action: none; /* Importante para mobile */
            z-index: 100;
        }

        #btn-next { margin-top: 40px; }
    </style>
</head>
<body>

    <div class="text-center pt-10 px-6">
        <h2 class="text-xl font-bold text-blue-400 uppercase tracking-tighter">Fase 6: Blindagem Final</h2>
        <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-2">Arraste os escudos para as áreas de risco</p>
    </div>

    <div class="map-container" id="map">
        <div class="area" style="top: 10%; left: 5%;" id="target-1">LOGÍSTICA</div>
        <div class="area" style="top: 40%; left: 37%;" id="target-2">FISCAL</div>
        <div class="area" style="top: 10%; right: 5%;" id="target-3">DADOS</div>

        <div class="shield" id="s1" style="top: 220px; left: 30px;">🛡️</div>
        <div class="shield" id="s2" style="top: 220px; left: 145px;">🛡️</div>
        <div class="shield" id="s3" style="top: 220px; right: 30px;">🛡️</div>
    </div>

    <button id="btn-next" class="hidden bg-green-600 text-white px-10 py-4 rounded-full font-bold shadow-xl animate-bounce" onclick="window.location.href='fase7.html'">FINALIZAR MISSÃO →</button>

    <script>
        let protectedCount = 0;
        const shields = document.querySelectorAll('.shield');
        const areas = document.querySelectorAll('.area');

        shields.forEach(shield => {
            shield.addEventListener('touchstart', touchStart, {passive: false});
            shield.addEventListener('touchmove', touchMove, {passive: false});
            shield.addEventListener('touchend', touchEnd);

            // Suporte para mouse também
            shield.addEventListener('mousedown', mouseDown);
        });

        let currentShield = null;

        function touchStart(e) {
            currentShield = e.target;
            e.preventDefault();
        }

        function touchMove(e) {
            if (!currentShield) return;
            e.preventDefault();
            
            const touch = e.touches[0];
            const mapRect = document.getElementById('map').getBoundingClientRect();
            
            // Calcula a posição relativa ao container para não fugir da tela
            let x = touch.clientX - mapRect.left - 30; // 30 é metade da largura do escudo
            let y = touch.clientY - mapRect.top - 30;

            currentShield.style.left = x + 'px';
            currentShield.style.top = y + 'px';

            checkCollision(currentShield);
        }

        function touchEnd(e) {
            currentShield = null;
        }

        // Funções de Mouse (Desktop)
        function mouseDown(e) {
            currentShield = e.target;
            document.onmousemove = mouseMove;
            document.onmouseup = mouseUp;
        }

        function mouseMove(e) {
            if (!currentShield) return;
            const mapRect = document.getElementById('map').getBoundingClientRect();
            let x = e.clientX - mapRect.left - 30;
            let y = e.clientY - mapRect.top - 30;
            currentShield.style.left = x + 'px';
            currentShield.style.top = y + 'px';
            checkCollision(currentShield);
        }

        function mouseUp() {
            currentShield = null;
            document.onmousemove = null;
        }

        function checkCollision(shield) {
            const sRect = shield.getBoundingClientRect();
            
            areas.forEach(area => {
                if (area.classList.contains('protected')) return;

                const aRect = area.getBoundingClientRect();
                
                // Verifica se o escudo está sobre a área
                const overlap = !(sRect.right < aRect.left || 
                                  sRect.left > aRect.right || 
                                  sRect.bottom < aRect.top || 
                                  sRect.top > aRect.bottom);

                if (overlap) {
                    area.classList.add('protected');
                    area.innerHTML = "🛡️ OK";
                    shield.style.display = 'none';
                    protectedCount++;
                    
                    if (protectedCount === 3) {
                        document.getElementById('btn-next').classList.remove('hidden');
                    }
                }
            });
        }
    </script>
</body>
</html>
