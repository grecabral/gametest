<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fase 6: Alocação Estratégica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .map-container { position: relative; width: 600px; height: 400px; background: rgba(30, 41, 59, 0.5); border: 2px dashed #3b82f6; border-radius: 20px; }
        .area { position: absolute; width: 120px; height: 80px; background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; transition: 0.3s; }
        .protected { background: rgba(34, 197, 94, 0.2) !important; border-color: #22c55e !important; color: #22c55e; }
        .shield { width: 50px; height: 50px; background: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: grab; font-size: 1.2rem; box-shadow: 0 0 15px #3b82f6; position: absolute; }
    </style>
</head>
<body>

    <div class="text-center z-10 p-4">
        <h2 class="text-xl font-bold text-blue-400 mb-2 uppercase">Fase 6: Blindagem de Valor</h2>
        <p class="text-xs text-slate-400 mb-8">Arraste os escudos da Auditoria para as áreas em risco (Vermelho).</p>

        <div class="map-container mx-auto" id="map">
            <div class="area" style="top: 20%; left: 10%;" id="target1">LOGÍSTICA</div>
            <div class="area" style="top: 60%; left: 40%;" id="target2">TRIBUTÁRIO</div>
            <div class="area" style="top: 20%; right: 10%;" id="target3">DADOS (LGPD)</div>

            <div class="shield" style="bottom: -80px; left: 30%;" draggable="true" ondragstart="drag(event)" id="s1">🛡️</div>
            <div class="shield" style="bottom: -80px; left: 45%;" draggable="true" ondragstart="drag(event)" id="s2">🛡️</div>
            <div class="shield" style="bottom: -80px; left: 60%;" draggable="true" ondragstart="drag(event)" id="s3">🛡️</div>
        </div>

        <button id="btn-next" class="hidden mt-20 bg-blue-600 px-10 py-3 rounded-full font-bold animate-bounce" onclick="window.location.href='fase7.html'">GERAR CERTIFICADO FINAL →</button>
    </div>

    <script>
        let protectedAreas = 0;

        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }

        document.querySelectorAll('.area').forEach(area => {
            area.ondragover = (ev) => ev.preventDefault();
            area.ondrop = (ev) => {
                ev.preventDefault();
                const data = ev.dataTransfer.getData("text");
                const shield = document.getElementById(data);
                
                if (!area.classList.contains('protected')) {
                    area.classList.add('protected');
                    area.innerHTML = "🛡️ PROTEGIDO";
                    shield.style.display = 'none';
                    protectedAreas++;
                    
                    if (protectedAreas === 3) {
                        document.getElementById('btn-next').classList.remove('hidden');
                    }
                }
            };
        });
    </script>
</body>
</html>
