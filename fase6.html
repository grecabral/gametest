<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fase 6: Alocação Estratégica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #fff; font-family: sans-serif; height: 100vh; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .map-container { 
            position: relative; width: 90vw; height: 50vh; 
            background: rgba(30, 41, 59, 0.3); border: 2px dashed #3b82f6; 
            border-radius: 20px; margin-top: 20px;
        }

        .area { 
            position: absolute; width: 100px; height: 60px; 
            background: rgba(239, 68, 68, 0.2); border: 2px solid #ef4444; 
            border-radius: 10px; display: flex; align-items: center; 
            justify-content: center; font-size: 0.6rem; font-weight: bold; 
            text-align: center; pointer-events: none;
        }

        .protected { 
            background: rgba(34, 197, 94, 0.3) !important; 
            border-color: #22c55e !important; color: #22c55e; 
        }

        .shield { 
            width: 60px; height: 60px; background: #3b82f6; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-size: 1.5rem; 
            box-shadow: 0 0 15px #3b82f6; position: absolute; 
            cursor: grab; touch-action: none; z-index: 100;
        }
        
        #btn-next { position: fixed; bottom: 40px; }
    </style>
</head>
<body>

    <div class="text-center px-4">
        <h2 class="text-xl font-bold text-blue-400 uppercase">Fase 6: Blindagem</h2>
        <p class="text-[10px] text-slate-400 uppercase tracking-widest">Arraste os escudos para as áreas vermelhas</p>
    </div>

    <div class="map-container" id="map">
        <div class="area" style="top: 15%; left: 10%;" data-target="t1">LOGÍSTICA</div>
        <div class="area" style="top: 50%; left: 35%;" data-target="t2">TRIBUTÁRIO</div>
        <div class="area" style="top: 15%; right: 10%;" data-target="t3">DADOS (LGPD)</div>

        <div class="shield" id="s1" style="bottom: 10px; left: 15%;">🛡️</div>
        <div class="shield" id="s2" style="bottom: 10px; left: 42%;">🛡️</div>
        <div class="shield" id="s3" style="bottom: 10px; right: 15%;">🛡️</div>
    </div>

    <button id="btn-next" class="hidden bg-green-600 px-10 py-4 rounded-full font-bold shadow-lg animate-bounce" onclick="window.location.href='fase7.html'">GERAR CERTIFICADO →</button>

    <script>
        let protectedCount = 0;
        const shields = document.querySelectorAll('.shield');
        const areas = document.querySelectorAll('.area');

        shields.forEach(shield => {
            let offset = { x: 0, y: 0 };
            let isDragging = false;

            const startAction = (e) => {
                isDragging = true;
                const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
                
                const rect = shield.getBoundingClientRect();
                offset.x = clientX - rect.left;
                offset.y = clientY - rect.top;
                shield.style.cursor = 'grabbing';
            };

            const moveAction = (e) => {
                if (!isDragging) return;
                e.preventDefault();
                const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;

                shield.style.left = (clientX - offset.x) + 'px';
                shield.style.top = (clientY - offset.y) + 'px';
                shield.style.bottom = 'auto'; // Remove a trava do CSS original
                shield.style.right = 'auto';
            };

            const endAction = (e) => {
                if (!isDragging) return;
                isDragging = false;
                shield.style.cursor = 'grab';

                // Verifica se caiu em cima de uma área
                const sRect = shield.getBoundingClientRect();
                const sCenterX = sRect.left + sRect.width / 2;
                const sCenterY = sRect.top + sRect.height / 2;

                areas.forEach(area => {
                    const aRect = area.getBoundingClientRect();
                    if (sCenterX > aRect.left && sCenterX < aRect.right &&
                        sCenterY > aRect.top && sCenterY < aRect.bottom &&
                        !area.classList.contains('protected')) {
                        
                        area.classList.add('protected');
                        area.innerHTML = "🛡️ PROTEGIDO";
                        shield.style.display = 'none';
                        protectedCount++;
                        
                        if (protectedCount === 3) {
                            document.getElementById('btn-next').classList.remove('hidden');
                        }
                    }
                });
            };

            // Eventos de Mouse
            shield.addEventListener('mousedown', startAction);
            window.addEventListener('mousemove', moveAction);
            window.addEventListener('mouseup', endAction);

            // Eventos de Toque (Celular)
            shield.addEventListener('touchstart', startAction, { passive: false });
            window.addEventListener('touchmove', moveAction, { passive: false });
            window.addEventListener('touchend', endAction);
        });
    </script>
</body>
</html>
